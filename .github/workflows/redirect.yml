# Redirect hezebang.github.io → zambar.dev
name: Deploy redirect to Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate redirect page
        run: |
          mkdir build
          cat << 'EOF' > build/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirect</title>
            <meta http-equiv="refresh" content="0; url=https://zambar.dev">
            <script>
              const target = "https://zambar.dev" + location.pathname + location.search + location.hash;
              location.replace(target);
            </script>
          </head>
          <body>
            Redirecting to <a href="https://zambar.dev">zambar.dev</a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
